name: Ingest Raw Docs → Wiki

on:
  push:
    paths:
      - 'raw/**'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force reprocess all sources'
        type: boolean
        default: false
      workers:
        description: 'Number of parallel workers (1 = sequential)'
        type: string
        default: '1'
      max-words:
        description: 'Skip files over this word count (0 = no limit)'
        type: string
        default: '3000'

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run batch ingestion
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --all"
          fi
          WORKERS="${{ github.event.inputs.workers || '1' }}"
          MAX_WORDS="${{ github.event.inputs.max-words || '3000' }}"
          uv run python scripts/ingest_external.py --workers "$WORKERS" --max-words "$MAX_WORDS" $ARGS

      - name: Run lint check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run python scripts/lint.py --structural-only --kb external
        continue-on-error: true

      - name: Commit results
        run: |
          git config user.email "action@github.com"
          git config user.name "Wiki Ingest Bot"
          git add wiki/ scripts/state.json
          git diff --staged --quiet || git commit -m "chore: ingest raw docs → wiki [skip ci]"
          git push